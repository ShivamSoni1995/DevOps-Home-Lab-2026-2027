apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-nginx-config
  namespace: humor-game
data:
  default.conf: |
    server {
        listen 80;
        server_name localhost;
        root /usr/share/nginx/html;
        index index.html;

        # Use kube-dns IP for dynamic backend resolution (prevents startup failure)
        # kube-dns ClusterIP: 34.118.224.10 (GKE Autopilot us-central1)
        resolver 34.118.224.10 valid=10s;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

        location = /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        location = /metrics {
            access_log off;
            default_type text/plain;
            return 200 "# HELP nginx_up Nginx up\n# TYPE nginx_up gauge\nnginx_up 1\n";
        }

        location ^~ /scripts/ {
            alias /usr/share/nginx/html/scripts/;
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        location ^~ /styles/ {
            alias /usr/share/nginx/html/styles/;
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        location ^~ /components/ {
            alias /usr/share/nginx/html/components/;
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # Proxy API calls to backend using variable (resolver required)
        location /api/ {
            set $backend_url http://backend.humor-game.svc.cluster.local:3001;
            proxy_pass $backend_url;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        location / {
            try_files $uri $uri/ /index.html;
            expires 5m;
            add_header Cache-Control "public, must-revalidate";
        }
    }
