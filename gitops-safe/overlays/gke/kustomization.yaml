apiVersion: kustomize.config.k8s.io/v1beta1
# ============================================================
# GKE Production Overlay — project: gke-project-491822
#
# Domain/TLS: not configured yet. Ingress uses no host restriction
# (accessible via LoadBalancer IP). Add domain + TLS later by:
#   1. Updating ingress.yaml with real host + cert-manager annotation
#   2. Restoring CORS_ORIGIN / FRONTEND_URL patches below
#
# Image tags are updated automatically by CI via `kustomize edit set image`.
# ============================================================
kind: Kustomization
namespace: humor-game
# Inherit all base resources (postgres, redis, backend, frontend, configmap, pvc, etc.)
resources:
- ../../base
- ingress.yaml
- network-policies.yaml
- hpa.yaml
# Image overrides — CI updates these tags on every successful build.
# The `name` field must match the image name used in base deployments.
# kustomize edit set image "humor-game-backend=REGION-docker.pkg.dev/PROJECT/REPO/backend:TAG"
images:
- name: humor-game-backend
  newName: us-central1-docker.pkg.dev/gke-project-491822/humor-game/backend
  newTag: 26ea967
- name: humor-game-frontend
  newName: us-central1-docker.pkg.dev/gke-project-491822/humor-game/frontend
  newTag: 26ea967
# --- Fix imagePullPolicy (base uses Never for local k3d) ---
# --- Production environment config ---
# CORS_ORIGIN is permissive (*) until a real domain is registered.
# Once you have a domain, replace * with https://your-domain.com
# --- GKE StorageClass for PVC (GKE Autopilot default: standard-rwo = GCP Premium PD) ---
# standard-rwo supports ReadWriteOnce and is the right choice for a single-replica Postgres.
# Remove this patch if you switch to Cloud SQL.
patches:
- patch: |-
    - op: replace
      path: /spec/template/spec/containers/0/imagePullPolicy
      value: IfNotPresent
    - op: replace
      path: /spec/replicas
      value: 2
  target:
    kind: Deployment
    name: backend
- patch: |-
    - op: replace
      path: /spec/template/spec/containers/0/imagePullPolicy
      value: IfNotPresent
    - op: replace
      path: /spec/replicas
      value: 2
  target:
    kind: Deployment
    name: frontend
- patch: |-
    - op: replace
      path: /data/NODE_ENV
      value: production
    - op: replace
      path: /data/CORS_ORIGIN
      value: "*"
    - op: replace
      path: /data/FRONTEND_URL
      value: "/"
  target:
    kind: ConfigMap
    name: humor-game-config
- patch: |-
    - op: add
      path: /spec/storageClassName
      value: standard-rwo
  target:
    kind: PersistentVolumeClaim
    name: postgres-pvc
commonAnnotations:
  gitops.argoproj.io/description: GKE production overlay for Humor Game
  gitops.argoproj.io/environment: gke
