apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: humor-game-safe
  namespace: argocd
spec:
  description: GitOps project for Humor Game — GKE production

  # Source repositories — replace YOUR_GITHUB_USERNAME with your actual GitHub username.
  # Run: sed -i 's|YOUR_GITHUB_USERNAME|<your-username>|g' gitops-safe/argocd-project.yaml
  sourceRepos:
  - 'https://github.com/ShivamSoni1995/DevOps-Home-Lab-2026-2027.git'

  # Destination clusters and namespaces
  destinations:
  - namespace: humor-game
    server: https://kubernetes.default.svc

  # Cluster resource allow list — Namespace only (ArgoCD creates it via syncOptions)
  clusterResourceWhitelist:
  - group: ''
    kind: Namespace

  # Namespace resource allow list — all resources managed by this project
  namespaceResourceWhitelist:
  - group: ''
    kind: ConfigMap
  - group: ''
    kind: Secret
  - group: ''
    kind: Service
  - group: ''
    kind: ServiceAccount
  - group: ''
    kind: PersistentVolumeClaim
  - group: 'apps'
    kind: Deployment
  - group: 'networking.k8s.io'
    kind: Ingress
  - group: 'networking.k8s.io'
    kind: NetworkPolicy
  - group: 'autoscaling'
    kind: HorizontalPodAutoscaler

  # Deny cluster-wide RBAC mutations
  clusterResourceBlacklist:
  - group: 'rbac.authorization.k8s.io'
    kind: ClusterRole
  - group: 'rbac.authorization.k8s.io'
    kind: ClusterRoleBinding

  orphanedResources:
    warn: true

  signatureKeys: []
